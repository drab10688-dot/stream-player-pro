# =============================================
# Omnisync - Configuración Nginx
# Archivo: /etc/nginx/sites-available/streambox
# SEGURIDAD: La IP origen de streams NUNCA se expone
# Incluye: Xtream Codes API, VOD uploads, Restreaming
# =============================================

server {
    listen 80;
    server_name _;

    # Ocultar versión de Nginx
    server_tokens off;

    # Sin límite de tamaño para subida de VOD (videos grandes)
    client_max_body_size 0;

    # =============================================
    # 1. PANEL WEB (Frontend React)
    # =============================================
    root /var/www/streambox;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # =============================================
    # 2. API (Node.js backend) — todas las rutas /api/
    # Incluye: restreaming, HLS segments, VOD streaming
    # =============================================
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;

        # Timeout largo para restreaming y uploads VOD grandes
        proxy_connect_timeout 1800;
        proxy_send_timeout 1800;
        proxy_read_timeout 1800;

        # Sin buffering para streams en tiempo real
        proxy_buffering off;
    }

    # =============================================
    # 3. XTREAM CODES API
    # Compatible con: TiviMate, IPTV Smarters Pro,
    # OTT Navigator, XCIPTV, GSE, Purple, etc.
    # =============================================
    location = /player_api.php {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
    }

    location = /get.php {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
    }

    location = /xmltv.php {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /live/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 300;
    }

    # =============================================
    # 4. ARCHIVOS ESTÁTICOS (logos, posters VOD)
    # =============================================
    location /uploads/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # =============================================
    # SEGURIDAD: Ocultar headers del origen
    # =============================================
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
    proxy_hide_header Via;
    proxy_hide_header X-Real-IP;
    proxy_hide_header X-Forwarded-For;
    proxy_hide_header X-Forwarded-Host;

    # Headers de seguridad adicionales
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy no-referrer always;

    # Bloquear acceso a archivos ocultos
    location ~ /\. {
        deny all;
    }
}
