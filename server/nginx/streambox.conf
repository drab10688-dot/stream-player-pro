# =============================================
# Omnisync - Configuración Nginx
# Archivo: /etc/nginx/sites-available/streambox
# SEGURIDAD: La IP origen de streams NUNCA se expone
# Ahora con RESTREAMING DINÁMICO por canal
# =============================================

server {
    listen 80;
    server_name _;

    # Ocultar versión de Nginx
    server_tokens off;

    # Sin límite de tamaño para subida de VOD (videos grandes)
    client_max_body_size 0;

    # =============================================
    # 1. PANEL WEB (Frontend React)
    # =============================================
    root /var/www/streambox;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # =============================================
    # 2. API (Node.js backend)
    # =============================================
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;

        # Timeout largo para restreaming
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;

        # Sin buffering para streams en tiempo real
        proxy_buffering off;
    }

    # =============================================
    # 3. XTREAM CODES API COMPATIBILITY
    # Para apps que usan login Xtream (TiviMate, XCIPTV, etc.)
    # =============================================
    location = /player_api.php {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /xmltv.php {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /get.php {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /live/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }

    # =============================================
    # SEGURIDAD: Ocultar headers del origen
    # =============================================
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
    proxy_hide_header Via;
    proxy_hide_header X-Real-IP;
    proxy_hide_header X-Forwarded-For;
    proxy_hide_header X-Forwarded-Host;

    # Headers de seguridad adicionales
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy no-referrer always;

    # =============================================
    # SEGURIDAD: Bloquear acceso directo a archivos sensibles
    # =============================================
    location ~ /\. {
        deny all;
    }
}

# =============================================
# PUERTO 25461: Tráfico APK (Xtream Codes compatible)
# Las apps IPTV se conectan aquí directamente
# =============================================
server {
    listen 25461;
    server_name _;
    server_tokens off;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }
}
