# =============================================
# Omnisync - Configuración Nginx
# Archivo: /etc/nginx/sites-available/streambox
# SEGURIDAD: La IP origen de streams NUNCA se expone
# Puerto 80/443: Panel Admin + Frontend
# Puerto 25461: API Xtream Codes para APKs
# =============================================

# =============================================
# 1. PANEL WEB (Frontend React) - Puerto 80
# =============================================
server {
    listen 80;
    server_name _;

    server_tokens off;

    # Sin límite de tamaño para subida de VOD/APK
    client_max_body_size 0;

    root /var/www/streambox;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;

        proxy_buffering off;
    }

    # Seguridad
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
    proxy_hide_header Via;
    proxy_hide_header X-Real-IP;
    proxy_hide_header X-Forwarded-For;
    proxy_hide_header X-Forwarded-Host;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy no-referrer always;

    location ~ /\. {
        deny all;
    }
}

# =============================================
# 2. API XTREAM CODES para APKs - Puerto 25461
# Todas las APKs conectan aquí directamente
# Compatible con: player_api.php, /live/, /get.php, /xmltv.php
# =============================================
server {
    listen 25461;
    server_name _;

    server_tokens off;

    # Sin límite para streams
    client_max_body_size 0;

    # Xtream Codes API endpoints
    location /player_api.php {
        proxy_pass http://127.0.0.1:3001/player_api.php;
        proxy_http_version 1.1;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }

    location /get.php {
        proxy_pass http://127.0.0.1:3001/get.php;
        proxy_http_version 1.1;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }

    location /xmltv.php {
        proxy_pass http://127.0.0.1:3001/xmltv.php;
        proxy_http_version 1.1;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Live streams: /live/username/password/streamId.ts
    location ~ ^/live/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60;
        proxy_send_timeout 600;
        proxy_read_timeout 600;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Movie streams
    location ~ ^/movie/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60;
        proxy_send_timeout 600;
        proxy_read_timeout 600;

        proxy_buffering off;
    }

    # Series streams
    location ~ ^/series/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60;
        proxy_send_timeout 600;
        proxy_read_timeout 600;

        proxy_buffering off;
    }

    # API general (restream, heartbeat, etc.)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;

        proxy_buffering off;
    }

    # Short format: /username/password/streamId (some APKs use this)
    location ~ ^/([^/]+)/([^/]+)/(\d+)\.?(.*)$ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60;
        proxy_send_timeout 600;
        proxy_read_timeout 600;

        proxy_buffering off;
    }

    # Descarga de APK
    location /downloads/ {
        alias /opt/streambox/apk/;
        autoindex off;
        add_header Content-Disposition "attachment";
    }

    # Seguridad
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
    proxy_hide_header Via;

    add_header X-Content-Type-Options nosniff always;

    location ~ /\. {
        deny all;
    }
}
