# =============================================
# Omnisync Player - Nginx Config (Puerto 8080)
# Coexiste con Xtream UI en puerto 80
# =============================================

server {
    listen 8080;
    server_name _;

    server_tokens off;

    # =============================================
    # FRONTEND (React Player)
    # =============================================
    root /var/www/omnisync-player;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # =============================================
    # API BRIDGE (Node.js → Xtream UI)
    # =============================================
    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;

        # Timeout largo para streams
        proxy_connect_timeout 1800;
        proxy_send_timeout 1800;
        proxy_read_timeout 1800;

        # Sin buffering para video en tiempo real
        proxy_buffering off;
    }

    # =============================================
    # SEGURIDAD
    # =============================================
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
    proxy_hide_header Via;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy no-referrer always;

    location ~ /\. {
        deny all;
    }
}
